<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Асинхронный расчёт с валидацией</title>
    <style>
        :root {
            --primary: #4361ee;
            --error: #e63946;
            --success: #2a9d8f;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #212529;
            --border: #dee2e6;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 2rem;
            width: 100%;
            max-width: 480px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--primary);
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #495057;
        }

        .required::after {
            content: " *";
            color: var(--error);
        }

        input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
        }

        input.error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.15);
        }

        .validation-message {
            font-size: 0.8rem;
            color: var(--error);
            margin-top: 0.3rem;
            display: none;
        }

        .validation-message.visible {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .btn:hover {
            background: #3651d5;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: var(--radius);
            background: #f1f3f5;
            display: none;
        }

        .result-section.visible {
            display: block;
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--success);
        }

        pre {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.8rem;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            color: #212529;
        }

        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.6s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Форма расчёта</h1>
    <form id="dataForm" novalidate>
        <div class="form-group">
            <label class="required" for="name">Имя</label>
            <input type="text" id="name" name="name" placeholder="Введите имя" autocomplete="off">
            <div class="validation-message" id="name-error"></div>
        </div>

        <div class="form-group">
            <label class="required" for="age">Возраст</label>
            <input type="number" id="age" name="age" placeholder="Введите возраст" min="1" max="120">
            <div class="validation-message" id="age-error"></div>
        </div>

        <div class="form-group">
            <label class="required" for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="example@mail.com">
            <div class="validation-message" id="email-error"></div>
        </div>

        <button type="submit" class="btn" id="submitBtn">Рассчитать</button>
    </form>

    <div id="resultBlock" class="result-section">
        <div class="result-title">✅ Результат с сервера</div>
        <pre id="resultContent"></pre>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // Элементы DOM
        const form = document.getElementById('dataForm');
        const nameInput = document.getElementById('name');
        const ageInput = document.getElementById('age');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const resultBlock = document.getElementById('resultBlock');
        const resultContent = document.getElementById('resultContent');

        // Поля для ошибок
        const nameError = document.getElementById('name-error');
        const ageError = document.getElementById('age-error');
        const emailError = document.getElementById('email-error');

        // Очистка всех ошибок и стилей
        function clearValidation() {
            [nameInput, ageInput, emailInput].forEach(input => input.classList.remove('error'));
            [nameError, ageError, emailError].forEach(el => {
                el.textContent = '';
                el.classList.remove('visible');
            });
        }

        // Показать ошибку конкретного поля
        function showFieldError(input, errorElement, message) {
            input.classList.add('error');
            errorElement.textContent = message;
            errorElement.classList.add('visible');
        }

        // Валидация формы
        function validateForm() {
            clearValidation();
            let isValid = true;

            // Имя: обязательное, не только пробелы
            const nameValue = nameInput.value.trim();
            if (!nameValue) {
                showFieldError(nameInput, nameError, 'Имя обязательно для заполнения');
                isValid = false;
            } else if (nameValue.length < 2) {
                showFieldError(nameInput, nameError, 'Имя должно содержать минимум 2 символа');
                isValid = false;
            }

            // Возраст: обязательное, число от 1 до 120
            const ageValue = ageInput.value.trim();
            if (!ageValue) {
                showFieldError(ageInput, ageError, 'Возраст обязателен');
                isValid = false;
            } else {
                const ageNum = Number(ageValue);
                if (isNaN(ageNum) || !Number.isInteger(ageNum) || ageNum < 1 || ageNum > 120) {
                    showFieldError(ageInput, ageError, 'Введите корректный возраст (целое число от 1 до 120)');
                    isValid = false;
                }
            }

            // Email: обязательное, формат
            const emailValue = emailInput.value.trim();
            if (!emailValue) {
                showFieldError(emailInput, emailError, 'Email обязателен');
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue)) {
                showFieldError(emailInput, emailError, 'Введите корректный email адрес');
                isValid = false;
            }

            return isValid;
        }

        // Блокировка/разблокировка кнопки и индикация загрузки
        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                submitBtn.innerHTML = '<span class="spinner"></span>Отправка...';
            } else {
                submitBtn.textContent = 'Рассчитать';
            }
        }

        // Отображение результата
        function displayResult(data) {
            resultContent.textContent = JSON.stringify(data, null, 2);
            resultBlock.classList.add('visible');
        }

        // Скрытие результата
        function hideResult() {
            resultBlock.classList.remove('visible');
            resultContent.textContent = '';
        }

        // Отправка данных на сервер
        async function submitData(formData) {
            // Используем httpbin.org/post – реальный публичный API, который возвращает отправленные данные
            // Вы можете заменить URL на свой endpoint
            const response = await fetch('/calculation', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            if (!response.ok) {
                throw new Error(`Ошибка сервера: ${response.status} ${response.statusText}`);
            }

            const data = await response.json();
            // httpbin возвращает объект с полями: json (наши данные), headers, url и т.д.
            // Вернем для отображения только значимую часть – присланный объект
            return {
                sentData: data.json,
                serverReceivedAt: new Date().toISOString()
            };
        }

        // Обработчик отправки формы
        form.addEventListener('submit', async function(event) {
            event.preventDefault(); // Отменяем стандартную отправку

            // 1. Валидация
            const isValid = validateForm();
            if (!isValid) {
                hideResult();
                return; // Прерываем, ошибки уже показаны
            }

            // 2. Формируем объект данных (без null)
            const payload = {
                name: nameInput.value.trim(),
                age: Number(ageInput.value.trim()),
                email: emailInput.value.trim()
            };

            // Дополнительная проверка на null/undefined (хотя валидация гарантирует)
            if (Object.values(payload).some(v => v === null || v === undefined || v === '')) {
                alert('Обнаружены пустые значения. Проверьте форму.');
                return;
            }

            // 3. Отправка и получение ответа
            setLoading(true);
            hideResult();

            try {
                const serverResponse = await submitData(payload);
                displayResult(serverResponse);
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Не удалось выполнить расчёт. Проверьте соединение или повторите позже.');
                // В реальном приложении можно показать ошибку в интерфейсе
            } finally {
                setLoading(false);
            }
        });

        // Динамическая очистка ошибок при вводе (улучшение UX)
        [nameInput, ageInput, emailInput].forEach(input => {
            input.addEventListener('input', function() {
                // Убираем красную рамку при изменении значения
                this.classList.remove('error');
                // Находим соответствующий блок ошибки и скрываем
                const errorEl = document.getElementById(this.id + '-error');
                if (errorEl) {
                    errorEl.textContent = '';
                    errorEl.classList.remove('visible');
                }
            });
        });

    })();
</script>
</body>
</html>
