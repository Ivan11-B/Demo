databaseChangeLog:
  - changeSet:
      id: 6
      author: ivan
      comment: Создание таблицы днищ и загрузка данных
      changes:
        - createTable:
            tableName: bottoms
            schemaName: public
            columns:
              - column:
                  name: thickness
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: diameter
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: weight
                  type: DECIMAL(10,3)
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: bottoms
            columnNames: thickness, diameter
            constraintName: pk_bottoms
        - loadData:
            tableName: bottoms
            file: data/bottoms.csv
            relativeToChangelogFile: true
            separator: ";"
            columns:
              - column:
                  header: thickness
                  name: "thickness"
              - column:
                  header: diameter
                  name: "diameter"
              - column:
                  header: weight
                  name: "weight"