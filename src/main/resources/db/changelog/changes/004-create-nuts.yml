databaseChangeLog:
  - changeSet:
      id: 4
      author: ivan
      comment: Создание таблицы гаек и загрузка данных
      changes:
        - createTable:
            tableName: nuts
            schemaName: public
            columns:
              - column:
                  name: diameter
                  type: INTEGER
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: weight
                  type: DECIMAL(10, 3)
                  constraints:
                    nullable: false
        - loadData:
            tableName: nuts
            file: data/nuts.csv
            relativeToChangelogFile: true
            separator: ","
            columns:
              - column:
                  header: diameter
                  name: "diameter"
              - column:
                  header: weight
                  name: "weight"