databaseChangeLog:
  - changeSet:
      id: 3
      author: ivan
      comment: Создание таблицы шайб и загрузка данных
      changes:
        - createTable:
            tableName: pucks
            schemaName: public
            columns:
              - column:
                  name: diameter
                  type: INTEGER
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: weight
                  type: DECIMAL(10,3)
                  constraints:
                    nullable: false
        - loadData:
            tableName: pucks
            file: data/pucks.csv
            relativeToChangelogFile: true
            separator: ","
            columns:
              - column:
                  header: diameter
                  name: "diameter"
              - column:
                  header: weight
                  name: "weight"