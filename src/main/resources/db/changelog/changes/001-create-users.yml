databaseChangeLog:
  - changeSet:
      id: 1
      author: ivan
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - insert:
            tableName: users
            columns:
              - column: { name: "name", value: "admin" }
              - column: { name: "password", value: "$2a$10$byoXVDXZJjIiIyJ7yoyKpO23VCxNW8w0TjvgnI.VRo/RAaXcOQgJm" }
              - column: { name: "role", value: "ADMIN" }